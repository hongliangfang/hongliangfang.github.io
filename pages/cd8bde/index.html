垫与努力，没有辛勤的汗水，快乐也就不再真实。</p> <p>如果快乐触手可及，这种廉价的快乐也就不值得珍惜，随时都可能抛弃。因此，对于年轻人而言，一个重要的功课就是学会去节制欲望。</p> <p>所有通过捷径所带来的快乐，都是廉价的，以至于所有追求都变得毫无意义，人生就了无生趣。我们需要在每天真实的努力中去拥抱生活，追寻真实的快乐。</p> <div class="center-container"><p><img src="https://jsd.cdn.zzko.cn/gh/xugaoyi/image_store/blog/20200626212238.webp" alt=""></p></div><blockquote><p>文章摘录自:B站视频《罗翔说刑法》，链接<a href="https://b23.tv/K8ulrE" target="_blank" rel="noopener noreferrer">https://b23.tv/K8ulrE<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p></blockquote></div></div>  <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E9%B8%A1%E6%B1%A4" title="标签">#鸡汤</a></div> <!----></div> <div class="page-nav-wapper"><!----> <!----></div></div> <div class="article-list"><div class="article-title"><a href="/archives/" class="iconfont icon-bi">最近更新</a></div> <div class="article-wrapper"><dl><dd>01</dd> <dt><a href="/pages/c81394/"><div>
