<a href="https://help.obsidian.md/Home" target="_blank" rel="noopener noreferrer">Home - Obsidian Help<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> <a href="https://docs.obsidian.md/Home" target="_blank" rel="noopener noreferrer">Home - Developer Documentation (obsidian.md)<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <p>该软件基于<a href="https://www.electronjs.org/docs/latest" target="_blank" rel="noopener noreferrer">lectron (electronjs.org)<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>
Electron is a framework for building desktop applications using JavaScript, HTML, and CSS.
By embedding <a href="https://www.chromium.org/" target="_blank" rel="noopener noreferrer">Chromium<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> and <a href="https://nodejs.org/" target="_blank" rel="noopener noreferrer">Node.js<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> into its binary(嵌入)
Electron allows you to maintain one JavaScript codebase and create cross-platform apps that work on Windows, macOS, and Linux — no native development experience required.</p> <h2 id="笔记思考"><a href="#笔记思考" class="header-anchor">#</a> 笔记思考</h2> <p>标签的思考</p> <p>标签 = 叙词（图书馆中） -- 是一种面向内容的，后组式，知识管理语言。</p> <ul><li>面向内容的，标签要根据文章想要表达的<strong>内容</strong>而定（内容较少的内容，不建议设置标签）</li> <li>后组式，通过<strong>简单标签</strong>的<strong>组合</strong>，表达复杂内容，减少了标签的数量</li></ul> <p>双联的思考</p> <p>四种需求 -- 四种目录</p> <ul><li>名称需求 -- 名称目录</li> <li>作者需求 -- 作者目录</li> <li>分类需求 -- 分类目录</li> <li>主题需求 --主题目录</li></ul> <p>双联本质上，是简化了创建主题目录的过程，所以会很方便。但是如果设置太多的双联，会导致文章间的联系很混乱，所以要根据目的，时常主动修改和调整。</p> <h2 id="使用过程中的小tips"><a href="#使用过程中的小tips" class="header-anchor">#</a> 使用过程中的小tips</h2> <p>自定义的规则</p> <p><strong>标签在前面，引用在最后</strong>：标签是给自己的看的，快速知道该篇文章的定位，中间是自己的思考，不要粘贴垃圾，最后的引用是方便自己再去溯源会看知识来源（因为懒所以简洁）</p> <p><strong>主题文件夹，主题文件</strong>：一个主题研究学习的若干文档，放在一个文件夹中，必要情况下再建立一个位于最高级目录下同名的文档，链接到文件夹下的所有文件（总分总）</p> <h2 id="快捷键"><a href="#快捷键" class="header-anchor">#</a> 快捷键</h2> <p>预览模式和编辑模式：ALT+E（自己修改的）<br>
显示大纲标签页：CTRL+E（自己设定的）<br>
快速打开命令面板：ALT+O（order）<br>
快速插入日期：ALT+D（date）<br>
快速插入时间：ALT+T（time）</p> <h2 id="标签、标题、等级"><a href="#标签、标题、等级" class="header-anchor">#</a> 标签、标题、等级</h2> <p>#贴着写是标签</p> <p>第一部分内容（回车）
第二部分内容
第三部分内容</p> <ul><li>短横线+空格是无序等级</li> <li>数字+ . + 空格 是有序等级</li></ul> <h2 id="链接"><a href="#链接" class="header-anchor">#</a> 链接</h2> <p>链接到某一篇笔记：[[ ]]<br>
链接到某一篇笔记中的某个标题：[[ # ]]<br>
链接到某一篇笔记中的某个段落（块）：[[ # ^ ]]<br>
为链接创建定义（关键词）：[[ | 关键词]]</p> <p>链接图片：![[图片]]
外部链接：<a href="https://www.xxx.com" target="_blank" rel="noopener noreferrer"><span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <h2 id="进度条"><a href="#进度条" class="header-anchor">#</a> 进度条</h2> <p>进度条语法：<code>&lt;progress value=&quot;20&quot; max=&quot;50&quot;&gt;&lt;/progress&gt;</code><br>
效果：<progress value="20" max="50"></progress></p> <h2 id="厉害的主题"><a href="#厉害的主题" class="header-anchor">#</a> 厉害的主题</h2> <p>感觉蛮好看的，所以想想如何在obsidian上试试搞一些东西<br>
这两个up主的主页还蛮好看的嘞：<br> <a href="https://space.bilibili.com/236665797" target="_blank" rel="noopener noreferrer">凯恩斯的个人空间<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a><br> <a href="https://www.bilibili.com/video/BV1FL411U7is/?spm_id_from=333.337.search-card.all.click&amp;vd_source=78f8345d33bcf466b3ef0f9f63393b77" target="_blank" rel="noopener noreferrer">从零搭建个人科研库<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <h2 id="第三方插件"><a href="#第三方插件" class="header-anchor">#</a> 第三方插件</h2> <p>一、自动下载

<a href="/_posts/03.快速查阅.html">03.快速查阅</a></p> <h2 id="看板"><a href="#看板" class="header-anchor">#</a> 看板</h2> <p>（与博客Markdown的语法有冲突，暂时不使用）</p> <p>看板使用方法：</p> <ul><li>ALT+O（order）打开命令面板搜索“kanban”</li> <li>文件夹右键，新建看板，可以小组件编辑，也可以markdown编辑</li> <li>CTRL+点击查看小组件样式</li></ul> <p>YAML语法：kanban-plugin: basic</p> <h2 id="思维导图连用iframe"><a href="#思维导图连用iframe" class="header-anchor">#</a> 思维导图连用iframe</h2> <p>iframe 元素会创建包含另外一个文档的内联框架（即行内框架）<br>
同时还可以插入其他网页的页面</p> <h2 id="fastgithub"><a href="#fastgithub" class="header-anchor">#</a> fastgithub</h2> <p>2.3 linux-x64终端</p> <ul><li><code>sudo ./fastgithub</code></li> <li>设置系统自动代理为<code>http://127.0.0.1:38457</code>，或手动代理http/https为<code>127.0.0.1:38457</code>
