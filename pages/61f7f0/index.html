ss="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> <a href="https://mp.weixin.qq.com/s/_xVOBTJ0DkpxiIj03NY6TQ" target="_blank" rel="noopener noreferrer">看完还不会来揍/找我 | TCGA 与 GTEx 数据库联合分析 | 附完整代码 + 注释 (qq.com)<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <p>生存分析是什么？
时间维度上，相关因素，对生存事件的影响情况
怎么做生存分析？（data，code）
数据类型是，时间-事件的资料，为什么是事件呢？因为生存不一定是指死亡，也可以是指无病生存期之类的，只要是我们研究感兴趣的终点事件就可以。截尾值censored value，研究对象，因为各种原因，不能提供后续数据。
“死亡速度”，好像是看单位时间内的死亡速度有多快。产生“阳性事件”的快慢。
生存分析的一般内容：</p> <ol><li>描述生存过程，估计生存曲线 → 寿命表法，Kalplan-Meier法</li> <li>生存时间分布的组间比较 → Log rank检验，广义秩和检验</li> <li>评价影响因素 → Cox回归模型
研究开始到结束，这个时间段叫“生存时间”，两个时间点间，出现了“终点事件”以及其观察数据叫我完全数据，未出现“终点事件”中途退出的情况为删失数据。
生存分析图示|400</li></ol> <p>如何进行描述统计呢？
Kaplan-Meier估计方法：将参与人员按照参与时间的长短排序，逐个时间点计算生存率。
如何进行检验呢？
Log-rank检验，或Breslow检验，进行假设检验。</p> <p>survival analysis，生存分析
event，终点事件
survival time，起止时间间隔 / failure time，失效时间
censoring，删失/截堵</p> <p>所以数据最重要的是，时间（横坐标），发生事件数量，可以算出比例（纵坐标）！
再多加一列数据是其他因素（分开曲线），变成若干条生存曲线在一张图上，用Log-rank检验。</p> <p>注意：样本量越大，曲线越平滑，误差越大，越容易出现统计学差异；随访时间越长，越容易出现统计学差异；生存曲线与X轴交叉，可能是研究对象全部发生终点事件，还有可能失访了；生存曲线下方最好标识分组的依据，样本量，易看，说服力强。</p> <p>详细介绍<a href="http://thisis.yorven.site/blog/index.php/2020/04/06/survival-analysis/" target="_blank" rel="noopener noreferrer">生存分析 简明教程 | Kaplan-Meier | Cox 比例风险回归模型<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <p>TCGA study abbreviations，</p></div></div>  <div class="page-edit"><!----> <!----> <!----></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/49f65b/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">富集分析</div></a> <a href="/pages/9033c2/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">单细胞-细胞注释</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
