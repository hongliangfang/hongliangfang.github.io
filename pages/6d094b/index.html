</code></pre></div><p>我会不爱你吗？不爱你？不会，爱你 就像  爱生命。</p> <blockquote><p>哈哈，悟了，文人总是那么能说，能侃。</p></blockquote> <p>王小波在追李银河时，写到：你要是愿意，我就永远爱你。你要不愿意，我就永远相思。<br>
一想到你，我这张丑脸就泛起微笑。不管我本人有多么平庸，我总觉得对你的爱很美。<br>
我爱你，这就是我的命运。<br>
但愿我和你，是一只唱不完的歌。<br>
所以有什么事你先别哭，先来责备我，好吗？<br>
也许我是一个坏人，不过只要你吻我一下，就会变好呢。<br>
我把我整个灵魂都给你，连同他的怪癖，耍小脾气，忽暗忽明，一千八百种坏毛病，。它真讨厌，只有一点好，爱你。<br>
祝你今天愉快。你明天的娱乐留着我明天再祝。</p> <h2 id="《毛选》"><a href="#《毛选》" class="header-anchor">#</a> 《毛选》</h2> <p>《实践论》</p> <p>《矛盾论》</p> <p>这一部分一直没做笔记，但是，光看到这两篇文章的标题，就能让我感受颇深！</p> <h2 id="《小狗钱钱》"><a href="#《小狗钱钱》" class="header-anchor">#</a> 《小狗钱钱》</h2> <p>为什么想要经济自由？是因为不想因为没钱而生活的太辛苦，是为了<strong>身体和心灵的，稳定而自由</strong>，也为了实现更高的价值。我不相信当我吃不饱饭的时候，一直有压力的时候，处处受别人挤压的时候能有时间去思考存在的意义，去走少有人走但是却有很大意义和价值的路，去做一颗闪耀在人类历史长河中的星星。
抱着这本纸质的书去读没办法去复制，所以，不少内容需要自己来敲出来，不过也好，能够再回味一下这本书的优秀的部分，让我感触的部分。
首先想分享一下我的感悟，不少概念和想法我听到过的，但是，如何运用起来真的还需要思考很多，去实践去行动尝试起来才知道会是什么样。而且很重要的是，这些相关的思考，想法有点乱了，所以需要联系和整理在一起，在这整理不顾是一些闲言碎语，所以，还是以<a href="/02.围炉夜话/05.经济独立.html">05.经济独立</a>这个主题整理一下吧。随后有的比较有意思的地方还可以整理过来。</p> <p>对了，人生可以分成几大课题？
健康，关系，情感，经济和人生意义，可以先这么分吗？</p> <p>摘录
复杂化的阐释有着模糊本质问题的倾向，描述最基本的真理也同样会带来风险。
耳熟能详的时候，不是将真正的信息拒之门外的理由。</p> <p>实践行动：
1、金钱对我来说意味这什么？<br>
意味着来这世间走一遭，一种能够享受美好生活的方法，一种支持做自己想做的事情的方法，一个做更有价值的事情的基础。意味着生存，分享，更深层次的认识这个世界。</p> <p>2、最想要实现的愿望是？<br>
让爱我的人，我爱的人，因为我的存在而感到幸福和快乐。即我的家人，我的爱人，我的孩子（如果有的话）能够因为我能够过上幸福快乐的生活！</p> <p>我和我爱的那个人，在一个喧闹的城市或一个清净的小山村，有一个舒适宽敞有阳光有花园有水池的小别墅，不需要太高，二层小楼就好。里面有厨房书房健身房卧室卫生间就好了，我们自己设计，我们自己参与装修，见证我们的家的成长和发展。有工作的时候可以去工作，没工作的时候可以窝在被窝里好好的搂着彼此唠嗑，睡觉，追剧，看电影；饿了就去厨房做些想吃的好吃的，自己试着动手，在做饭中享受烹饪的快乐，不想做也能随时就去下馆子，看到了哪个天南海北的小店想吃可以随时就出发，看到了哪里的美景想走就能一手拎着行李，一手拎着你舒舒服服的出发；想要安静的时候能够安安静静的看会书，我那个书房呀，可要有一个舒服的桌子和椅子，一个贼溜的电脑，还要有一台服务器，能够无所不能的在网络世界里飞驰！还要有一个书架摞满自己看过的书，桌子边一个可以很温馨，也可以很明亮的台灯，一个厚厚的的精致的小日记本，一个简洁舒适的笔，每晚能够写下当天的感想~</p> <p>比较现实的，金钱可以衡量的愿望是，三个小目标。最基础的，最近需要实现的是一个小目标，就是一个稳定的家，两个小目标，就是自由的灵魂，三个小目标就是，人类群星的闪耀之时！</p> <p>3、梦想相册：
<img src="https://cdn.statically.io/gh/hongliangfang/picx-images-hosting@master/wlyh/1%E5%A3%81%E7%BA%B8.2zwptdmb0pm0.webp" alt="1壁纸"></p> <p>梦想储蓄罐：<br> <progress value="2" max="1000"></progress></p> <h2 id="《穷查理宝典》"><a href="#《穷查理宝典》" class="header-anchor">#</a> 《穷查理宝典》</h2> <p>人类误判心理学~
<a href="https://www.mubu.com/doc/5qp87a4MuPO" target="_blank" rel="noopener noreferrer">幕布记录<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <h2 id="《人类简史》"><a href="#《人类简史》" class="header-anchor">#</a> 《人类简史》</h2> <p>ps：2023-10-17，听说蛮好的一本书，先看看视频</p> <p>人类简史中历史三大革命</p> <ul><li>认知革命，智人和猩猩分道扬镳之选择</li> <li>农业革命</li> <li>科技革命
关于农业革命
人类选择了安居乐业，看似有了安定的农田，房屋，能够更好的生存，但是从另一种角度上，
关于历史
关于快乐</li> <li>快乐的生理基础是血清素，多巴胺等物质的分泌，和突触结合后的反应</li> <li>快乐来自良好的人际关系</li> <li>快乐来自预期</li> <li>对生命意义的追寻和认同
关于欲望驱动的社会发展
关于信用构建的金融体系</li></ul> <p>有几个问题：
国家如何形成的？
权力如何而来？
精英是谁，在哪里？</p> <p>资本，是用来再生产的东西，如果不用来再生产，会停滞不前的！</p> <blockquote><p>对于我来说，如何投入再生产呢？</p></blockquote> <p>信任，是现代经济的基础，感觉这是个正向循环，可是为什么循环着循环着开始有种衰落的倾向呢？
影响这个“信任”的因素是什么呢？</p> <p>仿佛做什么都会受到“资本主义”的影响哎，确实，是一种超级大范围的影响，有的时候都深入到内心了：
干啥都要讲究效率，就像上学要追求效率，考上好高中大学，写基金也要考虑实用价值，买东西干啥的都要看看性价比，等等等等等</p> <p>有时候，我们追求一个美好的人生，变成了追求“效率”，追求“价值”，或者是追求”金钱“，好悲催</p> <p>对未来的信心来自于，资源，生产力；然而资源是有限的，生产力由科学技术的发展而推动；所以会说钞票是银行和政府印的，单是科学家买的！</p> <p>还有很多关于经济这个故事/规则的问题
<a href="/02.围炉夜话/05.经济独立.html">05.经济独立</a></p> <h2 id="《资本论》"><a href="#《资本论》" class="header-anchor">#</a> 《资本论》</h2> <h3 id="from-学院派"><a href="#from-学院派" class="header-anchor">#</a> from 学院派</h3> <p><a href="/02.围炉夜话/51.WPS-Academia.html">51.WPS-Academia</a></p> <p>1、哲学基础
世界观，方法论，
人是什么？
2、生产生活
维持人类生存的生产，仅次于生产的物品交换，是社会结构的基础，两者影响了分配方式，阶级划分，阶级秩序</p> <p>历史的变化，即社会物质条件的变化和经济社会关系的组织方式的变化，产生于现有经济和社会安排所带来的矛盾</p> <p>创造，或者是工作本身也应该是一种享受和快乐，不然就顺应了资本主义对工作的异化，他就得逞了</p> <p>喜欢，热爱，就去做，做到一个领域内无法替代，做到别人欣赏，佩服，也能够产生价值</p> <ul><li>劳动力的异化，劳动力=商品，出卖给资本家后，劳动过程被控制，劳动产品被剥夺；</li> <li>劳动过程的异化，单调重复的工作，让人无法作为人享受劳动的乐趣，无法在劳动之中成为自己；</li> <li>产品的异化，由于生产资料&amp;劳动产品归资本家所有，产品对工人来说是陌生的东西；</li> <li>人际关系的异化，人与人之间由于竞争，追求私有财产，逐渐相互对立，产生隔阂，变得冷漠，功利，自私</li></ul> <p>剩余价值理论</p> <ul><li>实际生产成本，取决于劳动力成本；</li> <li>劳动力成本，取决于劳动力的生产成本，还要再加上在生产成本；</li> <li>劳动力的生产成本，取决于劳动力生存的成本，繁衍的成本；</li> <li>资本家倾向于支付维持劳动力生存，繁衍的最低的工资；</li></ul> <h3 id="from-王德峰老师"><a href="#from-王德峰老师" class="header-anchor">#</a> from 王德峰老师</h3> <p>解释世界→解释实践
实践，是创生或改变，社会关系的活动；社会活动，是人与人之间的关系
世界，是建构在人与人之间的关系之上形成的</p> <p>资本论/经济学批判
人性：人性的本质是工作，个人的生产技能和能力是人类不可或缺的一部分；工作人类一种参与自然，改造自然的事情和能力，在这个过程中体现其意识。</p> <p>工作/生产也是人类的生活，在生产过程中我们相互影响，从作为一个独立物质的存在（本质），变成了一个与身份相适应的存在（身份）</p> <p>生活决定了意识，生活可以理解为生产生活，意识可以理解为身份，在什么样子的生产生活中，同样一般也是一个大的生产改造自然的群体中，我们将会被渲染成一个特定的身份，也就是去干特定的工作。</p> <p>历史唯物主义
维持人类生命的手段的生产和仅次于生产的物品交换，是所有社会结构的基础。
历史的变化，也是社会物质条件和经济社会关系的组织方式的变化产生于现有的经济和经济安排所带来的矛盾。</p> <p>奴隶社会和资本主义社会时的人与人之间的关系：资本主义社会，经济大于情感关系</p> <p>生产关系
工人是自由的，资本家也是“自由”的。</p> <p>在资本主义社会，工作失去了作为反映人类更高意识的创造性和合作性活动的潜力。</p> <p>工作是带来投入，奉献，快乐的一件事情，要做自己所喜欢的，所热爱的，能够养活自己的事业，而不能异化这份工作。</p> <p>四种异化</p> <p>劳动分工，亚当斯密提出，强调专业化分工的交换带来的物质优势，生产效率↑
劳动分工被马克思看作是对人和社会的异化和非人化，终将被科技取代和淘汰。我们作为一个人，本身的兴趣和爱好被放在了哪里呢？不能只想着成为一个螺丝钉镶嵌在生产线上。
劳动被分配，就像一个人被造成螺丝钉的模样装进生产线（虽然这个过程有时候感觉像是他自己主动选择的），而他如果不这样做，就得不到生存下去的工资。</p> <p>四种异化：
1、劳动生产者和劳动产品的脱离，生产后即成为商品去流通
2、工资劳动者不决定自己生产什么，劳动的客体化和对象化
3、劳动的异化，工作本是一种目的，现在变成了一种手段
4、人与人之间的异化，工作的合作关系变成了竞争关系</p> <h2 id="《稀缺》"><a href="#《稀缺》" class="header-anchor">#</a> 《稀缺》</h2> <p>2023-11-11、昨天还听到一个<strong>决策疲劳</strong>，应该也和注意力有关系；注意力是一个人宝贵的财富呀！今天想翻翻这本书，叫《稀缺》，里面提到两个词叫，<strong>心智容量</strong>，<strong>认知能力</strong>。
作者很牛，塞得希尔·穆来纳森，行为经济学家，哈佛大学终身教授，麦克阿瑟天才奖获得者。另一位作者是埃尔德·莎菲尔，心理学家；书籍也受到《快思考，慢思考》的作者，丹尼尔·卡尼曼的推荐。</p> <p>稀缺 → 专注红利 ↑；稀缺 → 带宽负荷 ↓</p> <blockquote><p>稀缺能够带来专注红利的同时，也会像吸引器似的，带来带宽的负荷。</p></blockquote> <p>带宽负荷，会影响两个能力--认识能力，执行控制力</p> <blockquote><p>认知能力，cognitive capacity，≈ 流体智力，解决问题，获取信息，进行逻辑推理等能力背后的心理学机制/能力
执行控制力，executive control，管理自身认知能力的过程中，计划，关注，发起并抑制行为和控制冲动等能力</p></blockquote> <p>经济独立，不仅仅是生活的独立，更是精神的独立。</p> <p>食物方面的”稀缺“，不是饥荒那种食物很少的状态，而是控制着热量摄入的这种食物稀缺，另一种程度上也算是食物/热量上的焦虑，亦会对带宽带来负荷。</p> <blockquote><p>一个更好的减肥计划，不妨从热量焦虑的角度，转变成，锻炼放松（听喜欢的音乐）的角度上面来</p></blockquote> <p>孤独也会降低控制力？？孤独倾向的人，吃的更多，更高脂肪？？</p> <p>稀缺，不同于压力，忧虑。
稀缺在之前的实验中证实会降低流体智力，可是关于压力的研究却发现，适当的压力是会提高智力相关表现的。</p> <blockquote><p>压力的常用指标是，心率的起伏
同时，又想到了，现代的科学，想要研究某个<strong>对象</strong>的某个<strong>属性</strong>，都需要用一些可以检测的<strong>指标</strong>来代替，有的时候就得判断，这个指标是否合适了！</p></blockquote></div></div>  <div class="page-edit"><!----> <!----> <!----></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/f46af5/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">万事如意</div></a> <a href="/pages/bdf6ea/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">知识体系</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
