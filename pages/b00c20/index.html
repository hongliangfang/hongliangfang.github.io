<a href="https://zhuanlan.zhihu.com/p/193140870" target="_blank" rel="noopener noreferrer">Git教程，很全面<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> <a href="https://zhuanlan.zhihu.com/p/668827628" target="_blank" rel="noopener noreferrer">Git教程，最新<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <p>git，常用的版本控制软件，基本流程：add，commit，push，pull</p> <p>几个地点：工作区→add→暂存区→commit→本地仓库→push→远程仓库→pull →工作区；或者，远程仓库→fetch→本地仓库→diff→工作区</p> <p>远程仓库：github，gitee/码云；本地文件</p> <div class="language- line-numbers-mode"><pre class="language-text"><code># 初始设置 —— 我是谁
git config --global --list
git config --global user.name &quot;hongliangfang&quot; # 设置用户名，无空格可不加引号
git config --global user.email 2590643635@qq.com # 设置联系方式


# 本地设置 —— 上传哪些
git bash here 右键或者 cmd 
git init # 我要控制这个文件夹内文件的版本
	--master # 默认在主分支，但是网站上默认是在main分支

git branch -M main # 从master分支改成默认的main分支
git add . # 提交到仓库 . 可以换成文件名

git commit # 提交到本地仓库；会出来vim，添加版本信息
git commit -m &quot;版本信息&quot; # 省去vim编辑过程
