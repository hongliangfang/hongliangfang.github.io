事情和自己关系的判断，如果资源不够，或是威胁到了自己的地位，也就威胁到自己的生存和发展，所以，总会找着各种理论，理由去打击你，去消灭你的存在。</p> <blockquote><p>注：虽然与伟人的认识有些相像的地方，但自己学习的内容很少，相关的认识也很浅薄</p></blockquote> <p>而像政治，经济，法律，意识形态，等等，社会或人文方面的诸多理论，概念，不都是人为定义，然后所相信的嘛？它们不像数学，物理学，化学，生物学的相关定律，是什么就是什么，发现后的事实就摆在那里，在不同的人之间使用或变化都是符合的！</p> <p>然后呢，在认识和实践的过程中，总会对相应的事物进行一个判断，以便日后更加合理的利用周围的物质资料，进行有利于自己生存发展的实践和改造，而这些个判断，被很多伟大的思想家，哲学家，教育家，战略家等等，所整理归纳，形成了很多厉害的理论观点，来指导我们认识和改造客观现实。</p> <p>同时呢，近现代以来，我们国家曾经的落后，使我们暂且在自然科学，社会科学，这些方面的研究和发展有所落后，近些年来我们一直在学习和模仿，可是，应该是在学习之后，“实事求是”的考察本身情况再应用的，我们很多细节不清楚，于是就近似于“照搬”过来，有不少理论概念我们直接去模仿，会有“水土不服”的现象呀</p> <p>还会产生很多奇奇怪怪的拼拼凑凑，就比如不少东西，甚至是起的名字会将英文和中文拼音拼在一起，新大正（我们学校物业管理的名字），New Da Zheng，然后缩写是NDZ，不应该是Xin Da Zheng，然后时XDZ吗，哈哈，感觉都很搞笑。我见过很多次，理解拼读不顺畅的时候，用一下学过的英语，很多就顺畅起来了。</p> <h2 id="_2024-01-12-复习妇产科"><a href="#_2024-01-12-复习妇产科" class="header-anchor">#</a> 2024-01-12，复习妇产科</h2> <p>下午刚写完传染病卷子，就早早交了，想回到教室复习妇产科，一个原因是，快来不及了，考试安排有点紧，今晚不好好看看，明天没时间复习儿童和皮肤，另一个心底里的原因是，对此很重视，心里对怀孕的母亲，满怀尊敬，的那种感觉，要是我不好好复习掌握，对以后的患者（虽然不去妇产科），对以后的另一半，如何交代！！</p> <p>人类进化的过程中，把繁衍后代的主要任务交给了女性，这个过程“危机四伏”，各种外部的危险（至少是远古时期），还要在妊娠，分娩的时候经历众多的生理性的改变，以及痛苦，以支持后代的生长。有的时候，胎儿在母体内，特别是胎盘，就像是一个时刻想要挣脱束缚的“肿瘤”，和母亲争夺着生存的利益，空间，营养物质等，很不小心的，胚胎组织，就可能疯狂的生长起来，所以一位母亲顺利产下一个孩子，不亚于抵抗住一个恶性肿瘤的增殖吧。</p> <p>想到我妈，还生了俩，第三个应该是人工提前流产了，真不容易！！</p> <p>想到未来的另一半，不想生就不生了吧~反正人类的繁衍管我们俩啥事。。</p> <p>最近这会儿，还想到一件事情，是从考传染病的时候想到的，其实，做一个好医生，能从蛛丝马迹中，诊断出病情！就像是下午从各种<code>发热皮疹</code>的症状中，诊断出感染的病原，然后知道用啥药治疗，怎么处理，还挺酷的！如果不考虑其复杂性的话，毕竟，哪个感染不发热呀；如果不考虑让人揪心的医患关系的话，不知道未来我能不能成为一名合格的医生，也不知道未来遇到的患者能不能体谅一点点....如果不考虑各种考核评价体系的话，如果生活还不错的话~</p> <p>想的有点远了，但是，对未来的幻想是，如果，简单点，就简单的当个医生，下班和另一半去锻炼锻炼，看看书，享受享受生活，假期和另一半带爸妈出去走走看看，应该，也不错吧。</p> <p>如果顺利的话，应该是比较顺利的，那为什么还要焦虑呢？就是，好好复习背书就是了！</p> <h2 id="_2024-01-20-宣誓词"><a href="#_2024-01-20-宣誓词" class="header-anchor">#</a> 2024-01-20，宣誓词</h2> <p>问同学要老师微信咨询一个疾病的预后诊疗的时候，想到了<code>健康所系，性命所托</code>，应该很少有专业在学习之前，是要一起宣誓的吧，这沉甸甸的分量啊。</p> <div class="language- line-numbers-mode"><pre class="language-text"><code>医学生誓言：

健康所系，性命相托。

当我步入神圣医学学府的时刻，谨庄严宣誓：

我志愿献身医学，热爱祖国，忠于人民，恪守医德，尊师守纪，刻苦钻研，孜孜不倦，精益求精，全面发展。

我决心竭尽全力除人类之病痛，助健康之完美，维护医术的圣洁和荣誉，救死扶伤，不辞艰辛，执着追求，为祖国医药卫生事业的发展和人类身心健康奋斗终生。
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br></div></div><h2 id="_2024-01-22-闲来无事"><a href="#_2024-01-22-闲来无事" class="header-anchor">#</a> 2024-01-22，闲来无事</h2> <p>最近两个多月以来，开始见习，复习，考试，好像都没多少时间在思考，看书了都，心里感觉空落落的。</p> <p>最近学习到了什么东西呢？临床上，见识到了不少疾病，课件上，不少知识点往脑袋里装过一遍，嗯，多多少少能够诊断下不少相关科目的疾病了，还不错吧！</p> <p>在考虑，要不要，把一些零零碎碎的日记搬到这里，可是又觉得太零碎了，有些话也不好意思，有机会让更多的人看到，嗯，这里，就，专门呢放些经过思考，整理后的东西吧！但是，我是真喜欢这里的编辑方式呀！因为Markdown语法，确实如一篇介绍所言，倒闭着自己输出！但是，咱也不能过于输出太多废话，对吧，克制，要克制！！</p> <h2 id="_2024-01-23-知错不改嘛"><a href="#_2024-01-23-知错不改嘛" class="header-anchor">#</a> 2024-01-23，知错不改嘛</h2> <p>为什么，很多人类知道某件事情是不合适的，是错的，就是不改呢？</p> <p>就比如这个科研和行医之间，使用相同的<code>评价体系</code>，都要靠些所谓的科研，发现有些人根本不适合搞科研，硬生生地去凑，去造假搞这件事情。</p> <p>读研，读博之后的一个文凭与工作挂钩，评价的时候，<code>科研水平</code>首选，好看，响当当的撑门面，升职加薪，反而违背了这个社会所赋予医生的这个责任？</p> <p>难道是因为，不好评价诊疗过程前后的价值嘛？</p> <p>不能单单去抱怨这件事情，得去思考接下来解决的方法</p></div></div>  <div class="page-edit"><!----> <!----> <!----></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/e334f2/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">WPS-Academia</div></a> <a href="/pages/91bcdf/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">随手记</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
