公众号：<a href="https://mp.weixin.qq.com/s/y7QIV1T-8gcZ2yz6_L_sDA" target="_blank" rel="noopener noreferrer">《柳叶刀》子刊：睡眠不够，运动凑不来<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p></blockquote> <p>增肌，腹肌，肱二头，背阔肌<br>
减脂，腹部脂肪，大腿脂肪</p> <h2 id="腹肌篇"><a href="#腹肌篇" class="header-anchor">#</a> 腹肌篇：</h2> <p>原则：</p> <ul><li>腹肌发力，练出效果，腹部火辣</li> <li>三七睡，控制饮食，少油少盐，早睡早起</li> <li>训练强度渐进加强；</li> <li>有氧辅助，降低体脂，体脂率＜15%</li></ul> <p>动作：</p> <ul><li>下腹部：抬腿卷腹，俯身登山，</li> <li>侧腹部：仰卧登车，俯卧对侧提膝/侧提膝</li> <li>上腹部：卷腹</li> <li>全腹部：开合跳，动态/静态平板支撑</li></ul> <blockquote><p>2023-12-09，昨天，四毛同学说，既然做了，那不妨做出些效果出来。嗯，做出些效果，要不，试试看？</p></blockquote> <p>睡眠<br> <a href="https://mp.weixin.qq.com/s/00AkJ1ZiILIRGZQMHwvpgA" target="_blank" rel="noopener noreferrer">【最佳睡眠时长】<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p></div></div>  <div class="page-edit"><!----> <!----> <!----></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><!----> <a href="/pages/f46af5/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">万事如意</div></a></div> <div class="page-nav"><p class="inner"><!----> <span class="next"><a href="/pages/f46af5/">万事如意</a>→
