"javascript:;" data-v-06225672>FHL</a></div> <div title="创建时间" class="date iconfont icon-riqi" data-v-06225672><a href="javascript:;" data-v-06225672>2024-03-04</a></div> <div title="分类" class="date iconfont icon-wenjian" data-v-06225672><a href="/categories/?category=%E9%9A%8F%E7%AC%94" data-v-06225672>随笔 </a></div></div></div></div> <!----> <div class="content-wrapper"><div class="right-menu-wrapper"><div class="right-menu-margin"><div class="right-menu-title">目录</div> <div class="right-menu-content"></div></div></div> <h1><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeCAYAAAA7MK6iAAAAAXNSR0IArs4c6QAABH1JREFUSA3tVl1oHFUUPmdmd2ltklqbpJDiNnXFmgbFktho7YMPNiJSSZM0+CAYSkUELVhM6YuwIPpgoOKDqOBDC0XE2CQoNtQXBUFTTcCi+Wlh1V2TQExsUzcltd3M9Tt3ZjZzZ2fT+OJTL8yeM+eee757fmeJbq//KQL8X3DUSFOcfr7cRsRtxNQMWueeVzOkaITIGqQHNg5y8+jNW9ldM7A6nTpAjuolUikAwq7CE3WcM2RRDz+XGVgN3FptU/aUSlvq9Pa3iZ1+sgAqJyyAFqkipd9dqiwHF3P65YycLWc/6sqGrvoEoIp6DOFaX5h6+dnfjkWprwqsPk0dUGq5vySwDImC10KxFHgGL1SWoc92O3eVht09qdXNH11I2SsTsJYqMWzihqGMi+A+Garf3BAuuLI5oGlULyNfyB/HYNujwktOfRrMr5t77NmevqaUopx0grnKAyvVpmwUDB4x6FPXuGvYLTDwWsejwgtgkYKPqRJg8SV6xaiZ3ZTppGneS4yfH5/66fZSDHv+QZci/+h5c5UHtpy67JUqGppM0sh0Nc1dW6/N1W5Yoqat8/TU/VnadmdeW2PLLSyh0cvxBs3KbqTmwYPpxN4do/mzE8nEpvX/UMu2Wbp74zUAK5q6WkHns7V0eWkdPbPzd3rxkTGybadYySumVzhcaJFbs5UrEkQ/+CK8gF5dnh/6ciIZ73gwQ927L1IitoxKLXYP3SjYdOrHHfTZhRRlFyrorafPk20B3HPD1y2G3qKZME5Jcf3t/HUC13/8tSd++vqFveMUTwAUxSUFI1QekR1+bIze3D9MF2aq6cPvG72CgnldWCFqyRw3lwH8ZMerjTD9ElRO7Gv44wNpC90aASqGfVlz/Rx17srQ57/UU26hkhQqUB7dBR71WmzQhHUnblGmVOEw0jhbV1n9OlXUDCIRGaNV5Jp43N516fN7JmnTHdfp7Hgy0luO4aMhtkLL8Bi3bUWYvzh5Mn1dTxrL6QmGuRhGL/TiTTxRoEdTszSaq9GR0NGA3KdkOz3hqSV3MIDhQ5IVX/Ivx3umBti2es2h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">文章复现记录<!----></h1>  <div class="theme-vdoing-content content__default"><p>标题：Hepatocytes demarcated by EphB2 contribute to the progression of nonalcoholic steatohepatitis</p> <p>开始时间：2024-03-04</p> <p>复现的整体思路：</p> <ol><li>首先再次阅读文献，整理分析的流程（使用的工具，详细的参数）；</li> <li>其次，下载数据，调整数据，调包进行处理；</li> <li>最后，整理输出数据，进行统计分析，绘制重要图。</li></ol> <h2 id="文章思路"><a href="#文章思路" class="header-anchor">#</a> 文章思路：</h2> <p><strong>Introduction</strong></p> <p>nonalcoholic fatty liver disease (NAFLD)；nonalcoholic fatty liver (NAFL)；nonalcoholic steatohepatitis (NASH)</p> <p>NASH病理生理过程涉及多种细胞，scRNA技术对肝细胞、以及肝脏特定细胞的覆盖率不高，对该疾病的进展过程研究也不多，相对来说局限于终末期这个时间点，我们用snRNA-seq，snATAC-seq技术能够有效的捕获人类和小鼠，NASH疾病过程中的，肝细胞核其它类型的细胞。最后我们鉴定出来一个和在人类肝脏中一致的小鼠干细胞亚群，在NASH阶段还表达EphB2。单独激活EphB2就足够引起细胞自身炎症，抑制就能减缓NASH模型小鼠中的干细胞纤维化。因此EphB2定义的干细胞对NASH过程有贡献。</p> <p><strong>R1：characterization of mouse models of NASH progression</strong></p> <p>Gubra amylin NASH (GAN) diet，American lifestyle–induced obesity syndrome (ALIOS) diet</p> <ul><li>3 months → hepatomegaly（肝肿大）；</li> <li>9 months → NASH；</li></ul> <p>肝肿大，体重升高，中度葡萄糖耐受不良，肝组织病理切片 ——→ 证明 NAFL &amp; NASH 小鼠模型成功</p> <p><strong>R2：Global transcriptomic feture shifts across all major mouse liver cell types during NASH progression</strong></p> <p>Sequencing samples / Condition groups / 四种样本：</p> <ul><li>3、9 months ALIOS = 3moALIOS、9moALIOS；</li> <li>3、9 months normal chow = 3moNC、9moNC；</li></ul> <p>Studying / focusing cells / 研究关注的细胞类型：</p> <ul><li>hepatocytes &amp; nonparenchymal cells（NPCs）</li></ul> <blockquote><p>NPCs 包括：macrophage，endothelial cells（ECs），stellate cells，cholangiocytes</p></blockquote> <p>comparable recovery：线粒体比例，基因数量</p> <div class="language- line-numbers-mode"><pre class="language-text"><code>## 描述统计比例的变化，相关基因的丰度变化
liver sinusoid endothelial markers Stab2
adhesion molecule PECAM1
contribute to fibrosis and extracellular matrix assembly such as Col1a1
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><p>描述细胞比例的变化，以及重要基因的丰度变化，与前人研究<code>一致</code>，表明小鼠模型的有效性，对人NASH疾病进展的代表性。</p> <p><strong>The transcriptomic signature of hepatocytes switches from macronutrient processing to cell migration during NASH progression in mice</strong></p> <p>hepatocyte</p> <ul><li>pericentral zone hepatocyte cluster (mPC-Hep),</li> <li>intermediate zone hepatocyte cluster (mInt-Hep),</li> <li>periportal zone hepatocyte cluster (mPP-Hep)</li></ul> <blockquote><p>distinct expression patterns of liver zonation markers：Glul, Aldh3a2, and Gls2</p></blockquote> <p>more shared changes：不同状态的差异Venn图，可以展示这个信息（交集越小，差异越大，越个性，specific）；</p> <p>组间比较细胞比例：细胞的比例变化，也和疾病进展有很大的关系；</p> <p>hepatokine fibrinogen-like protein 1 (Fgl1),
phospholipid-binding protein annexin A2 protein (Anxa2), senescence marker Cdkn1a (P21)</p> <p>Elovl5 and Insig2，supporting an adaptive en</p> <p>hancement of both de novo lipogenesis and fatty acid oxidation to process excessive nutrients in NAFL</p> <p><strong>Transcriptomic signatures of hepatocytes in human NASH resemble those of mouse</strong></p> <p>首先说明，数据质量较好、可比较：线粒体比例，基因数量（展示形式为：violin plot、UMAP plot）</p> <p>All major liver cell types were identified by snRNA-seq, including hepatocytes, ECs, stellate cells, cholangiocytes, vascular smooth muscle cells, and monocytes/macrophages</p> <p>肝细胞 ↓，NPCs ↑</p> <blockquote><p>specific zonation genes / zonation landmarks GLUL, SLCO1B3, and HSD17B13
lineage markers of hepatocytes, ACSL1, ALDH1A2, HNF4A</p></blockquote> <p>gluconeogenesis FOXO1 and glucose transporter SLC2A2 (GLUT2) -- 糖异生，葡萄糖转运体</p> <p>对人的单细胞数据，也用monocle2进行分析，得到与小鼠分化相似的轨迹，然后做差异基因的功能研究。</p> <p><strong>EphB2 demarcates a subset of NASH hepatocytes engaged in intercellular cross-talk and trajectory bifurcation</strong></p> <p>与重要细胞间的，crosstalk，筛选出来了重要的细胞类型，在重要的细胞类型中，发现重要的受体/配体（receptor / ligand）</p> <p>Ephb2 RNA was expressed in a subset of hepatocytes labeled with Hnf4a</p> <p>another diet-induced NASH model, the cholinedeficient L-amino acid–defined high-fat diet (CDAHFD) administered for 2 months</p> <p>Ephb2-positive cells abundantly expressed pericentral marker Aldh3a2 but lacked periportal marker Gls2</p> <p>根据基因的作用，重新聚类 / cluster，然后以一个新的角度，分析差异基因（新cluster，新比较角度，新差异基因）</p> <p><strong>Notch induces EphB2 expression in hepatocytes</strong></p> <p>肝细胞的表观遗传情况 / landscape → snATAC-seq</p> <p>transferred cell clustering labels</p> <blockquote><p>scATAC-seq如何进行降维聚类，以及注释的？得到的信息都是开放染色质信息呀？是不是开放的染色质信息转变成基因表达信息，再据此 基因/marker 定义不同的细胞类型？</p></blockquote> <p>不懂：表观调控关系，以及信号通路的关系，所以这段的后半部分看不懂。</p> <p><strong>EphB2 is sufficient to induce cell-autonomous inflammation in mouse and human hepatocytes</strong></p> <p>判断 EphB2（+）hepatocytes的功能 → gain-of-function study</p> <p>Forced expression of EphB2 in hepatocytes did not cause apparent cell apoptosis → DAPI，TUNEL（无则表明无凋亡）</p> <p>之后许多流式细胞分析，免疫荧光（共定位判断），验证了EphB2的作用；</p> <p>还用腺病毒载体，让细胞高表达这个EphB2，然后检测炎症指标。</p> <p><strong>Disease-activate EphB2 in hepatocytes contributes to NASH progression</strong></p> <p>next performed a loss-of-function study using an AAV-based CasRx-mediated RNA targeting system → to interrogate the role of EphB2</p> <p>a potent inducer：强效诱导剂</p> <p>Sirius Red：天狼星红</p> <p><strong>Discussion</strong></p> <p>总结全文的工作，讨论应用的意义，研究的不足，后续的展望。</p> <h2 id="使用的工具"><a href="#使用的工具" class="header-anchor">#</a> 使用的工具</h2> <p><strong>snRNA-seq</strong></p> <p>The nuclei isolation for snRNA-seq and snATAC-seq was adapted from the 10X Genomics nuclei demonstration protocol.</p> <p>snRNA-seq，raw fastq files，GRCH38（mm10，hg38），CellRanger（3.0.2）</p> <p>Seurat（3.2.0）<br>
nFeature_RNA &gt; 500 &amp; nFeature_RNA &lt; 8000 &amp; percent.mt &lt; 2 for mice；<br>
nFeature_RNA &gt; 500 &amp; nFeature_RNA &lt; 8000 &amp; percent.mt &lt; 10 for humans；</p> <p>merge and correct batch effect by harmony</p> <p>Unsupervised clustering，first 40 principal components，visualized in UMAP plot</p> <p>Cluster identities were annotated based on prior knowledge</p> <p>The doublets with mixed cell features were manually removed</p> <p>Pseudotime analysis of hepatocytes was performed with Monocle2 with default parameters</p> <ul><li>mouse: all hepatocytes;</li> <li>human: randomly selected 2000 hepatocytes from each hepatocyte cluster</li></ul> <p>The genes determined the bifurcation of hepatocyte trajectories were defined with q value &lt; 1e-20</p> <p>GO analysis -- Metascape (http://metascape.org)</p> <p>Cell-cell communication was analyzed with CellChat</p> <p>To analyze correlation between Ephb2 expression and the expression of inflammatory genes in hepatocytes, the expression value was transformed using <strong>MAGIC</strong> due to the sparsity of single-cell dataset</p> <p><strong>snATAC-seq</strong></p> <p>raw fastq files，mapped to GRCm38（mm10） using Cellranger-atac（1.2.0）</p> <p>fragment count matrix → Signac（1.8.0）</p> <blockquote><p>The nuclei with TSS enrichment score &lt; 2 &amp; pct_reads_in_peaks &lt; 40 &amp; nucleosome_signal &gt; 4 &amp; blacklist_ratio &gt; 0.025 were removed
The chromatin assays were integrated using FindIntegrationAnchors with dimension 2:30</p></blockquote> <p>ChromVAR，JASPAR 2018 core motifs (Homo sapiens)，STREAM pseudotime analysis，</p> <p><strong>Integration of snRNA-seq and snATAC-seq</strong></p> <p>Signac for integrating</p> <p>The <strong>peak to gene links</strong> were defined by the <strong>correlation between peak accessibility</strong> (snATAC-seq) and <strong>gene expression</strong> (transferred snRNA-seq information) in the matched cells.</p> <p>Signaling pathway enrichment analysis for candidate TFs regulating EphB2 was performed with R package clusterProfiler using all human genes as background and filtered by signaling transduction pathway annotation</p> <p><strong>Bulk-seq</strong></p> <p>raw fastq mapped to Mus musculus assembly GRCm38 (mm10) using STAR (2.5.4)</p> <p>R package DEseq2 to quantify gene expression</p> <blockquote><p>Significantly change genes → Genes with padj&lt;0.1 and Log2(FC) &gt; 0.5 or &lt; -0.5</p></blockquote> <p>Transcript-specific quantification of GSE119340 and GSE130970 were analyzed by Salmon</p> <h2 id="处理数据"><a href="#处理数据" class="header-anchor">#</a> 处理数据</h2> <p>数据早就下载好了，主要是下游的表达矩阵数据，但是还有几个工具不太会用，包括monocle2，CellChat，Signac；先Seurat 跑出来，注释好一部分内容后，再稍稍学习一下这三个工具吧</p> <p>后续进行R包的学习记录位置
