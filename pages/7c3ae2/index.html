村基吃到一份BBQ套餐，发现一种吃法，后续在吃烤肉调干碟的时候，也酱紫试了一下，发现确实不错！怎么做呢，就是：</p> <p>米饭配上，<code>碎海苔</code>，就酱紫拌在一起，就有种咸咸的，香香的味道，很不错！然后还可以加上刚烤好的五花肉，就更香了！</p> <h2 id="降糖的脂肪"><a href="#降糖的脂肪" class="header-anchor">#</a> 降糖的脂肪</h2> <p>2023-12-25，复习内分泌，看到一个疾病，糖尿病酮症酸中毒，Diabetic ketoacidosis，DKA，不太理解<code>酮</code>这个字，于是查了查，主要收获是：</p> <ul><li>脂肪燃烧后产生酮之后作为能量供应身体活动；</li> <li>酮有三类，乙酰乙酸盐，β羟基丁酸酯，丙酮；</li></ul> <p>之后，又看到低碳饮食之<code>生酮饮食</code>，主要概念是严格限制碳水的摄入（10%以内），增加脂肪的摄入（50%以上），控制蛋白质比例（30%多），猛然一听是有些惊讶的，可是细细回想我们的祖先，在狩猎采集时代，人类的食谱主要就是肉类，偶尔吃点采集到的“瓜果蔬菜”吧，所以，我们的胃肠道和身体应该更适应这样子的饮食吧。</p> <p>如此一来，血糖比例会下降很多，不至于吃饱后复习那么困了，也不会导致很多的胖子（血糖充裕就容易转变为脂肪消耗不掉），以及糖尿病了吧？？</p> <h2 id="沙沙的番茄"><a href="#沙沙的番茄" class="header-anchor">#</a> 沙沙的番茄</h2> <p>2024-02-03，晚上炒番茄鸡蛋，虽然鸡蛋没有炒的很好看，但是番茄的口感还不错，怎么做的呢？</p> <ul><li>就是先烧开些水，把番茄放进去滚烫一下，就能得到容易去皮的番茄，如果再多烫一会呢，番茄吃起来会变成那种沙沙的口感，就是酱紫。</li> <li>如果是做成番茄鸡蛋拌面呢，就可以再~多煮一会，之后在炒的阶段，加些酱料，然后多翻腾几下，就会出汁水啦！</li></ul></div></div>  <div class="page-edit"><!----> <!----> <!----></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/a99f0e/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">人生意义</div></a> <a href="/pages/c28002/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">诗酒趁年华</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
