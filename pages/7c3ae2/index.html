eme-vdoing-wrapper "><div class="articleInfo-wrap" data-v-06225672><div class="articleInfo" data-v-06225672><ul class="breadcrumbs" data-v-06225672><li data-v-06225672><a href="/" title="首页" class="iconfont icon-home router-link-active" data-v-06225672></a></li> <li data-v-06225672><a href="/wlyh/#围炉夜话" data-v-06225672>围炉夜话</a></li></ul> <div class="info" data-v-06225672><div title="作者" class="author iconfont icon-touxiang" data-v-06225672><a href="javascript:;" data-v-06225672>FHL</a></div> <div title="创建时间" class="date iconfont icon-riqi" data-v-06225672><a href="javascript:;" data-v-06225672>2023-12-08</a></div> <!----></div></div></div> <!----> <div class="content-wrapper"><!----> <h1><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeCAYAAAA7MK6iAAAAAXNSR0IArs4c6QAABGpJREFUSA3tVVtoXFUU3fvOI53UlmCaKIFmwEhsE7QK0ipFEdHEKpXaZGrp15SINsXUWvBDpBgQRKi0+KKoFeJHfZA+ED9KKoIU2gYD9UejTW4rVIzm0VSTziPzuNu1z507dibTTjL4U/DAzLn3nL3X2o91ziX6f9wMFdh6Jvbm9nNSV0msViVO6tN1Rm7NMu2OpeJ9lWBUTDxrJbYTS0hInuwciu9eLHlFxCLCZEk3MegsJmZ5K/JD6t7FkFdEvGUo1g7qJoG3MHImqRIn8/nzY1K9UPKKiJmtnUqHVE3Gbuay6vJE/N2FEmuxFjW2nUuE0yQXRRxLiTUAzs36zhZvOXJPdX850EVnnLZkB8prodQoM5JGj7Xk2mvC7JB8tG04Ef5PiXtG0UtxupRQSfTnBoCy554x18yJHI6I+G5Eru4LHmPJZEQsrvPUbMiA8G/WgMK7w7I+ez7++o2ANfbrjvaOl1tFMs+htG3IrZH9/hDX1Pr8Tc0UvH8tcX29KzAgIGcEkINyW5BF9x891hw6VYqgJHEk0huccS7vh3C6gTiODL+26huuBtbct8eZnqLML8PkxGYpuPZBqtqwkSjgc4mB5gbgig5i+y0UDK35LMxXisn9xQtK+nd26gTIHsHe/oblK/b29fUmN/8Y+9jAQrnBp56m1LcDlDp9irKTExSKduXJVWSqdBMA08pEJnEIOB3FPPMybu/oeV8zFeYN3xx576Q6RH+VmplE4ncQV5v+5rzSoyOU7PuEAg8g803PwBJ0CExno/jcMbN8tONYeOmHiuUNryvm3fRUy4tMPVLdAGkUhNWuggGrJcXPv+ouCjz0MKUHz1J2/E8IC9nqTabcxgaBYM0hPhD5Y65FsbxRQKxCQrDjDctW7PUM3HuZunFyifSAqEfuzCp48Il24luWUWZoyJCaPR82jE0+kFA643wRFVni4RYSq3ohJO2pZ7B5dO4xkDWbEpossJPLSrPjYID8rS2UHTlvyNxqIGsg674XJJ7vnh5L7PNwC4hh2sjCI96mzszOTpxLF0T7l88Yz7lAuK6OnL8gXLOnTvpzSb22YG8W7us3jSebFHeeqnXRG1vt+MoUM84LQIBmMsCTAcOauTh0T0l0neQK7m2bLMt2mGxU3HYssS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">食之有道<!----></h1>  <div class="theme-vdoing-content content__default"><p>2023-12-06，中午吃了一碗牛肉面，面很好吃，但是肉很柴，越咬越像柴火似的塞在嘴里，不太好吃，但是又想到为啥我吃过的土豆烧牛肉那么好吃，&quot;入口即化&quot;呢？于是想要稍微查一下是啥原因~</p> <p>看过几篇文章，发现一般把肉做的比较烂的流程是：</p> <ol><li>洗干净之后，冷水下锅，焯一遍，水倒掉，<code>热水冲干净</code>（一定要热水冲洗掉腥泡，否则热肉遇冷会皱缩）</li> <li>加些特定的调料（山楂，醋之类的，我猜是酸给<code>加速酶解</code>了）</li> <li><code>小火慢炖</code>，才能慢慢煮烂</li></ol> <p>之前去乡村基吃到一份BBQ套餐，发现一种吃法，后续在吃烤肉调干碟的时候，也酱紫试了一下，发现确实不错！怎么做呢，就是：</p> <p>米饭配上，<code>碎海苔</code>，就酱紫拌在一起，就有种咸咸的，香香的味道，很不错！然后还可以加上刚烤好的五花肉，就更香了！</p> <p>2023-12-25，复习内分泌，看到一个疾病，糖尿病酮症酸中毒，Diabetic ketoacidosis，DKA，不太理解<code>酮</code>这个字，于是查了查，主要收获是：</p> <ul><li>脂肪燃烧后产生酮之后作为能量供应身体活动；</li> <li>酮有三类，乙酰乙酸盐，β羟基丁酸酯，丙酮；</li></ul> <p>之后，又看到低碳饮食之<code>生酮饮食</code>，主要概念是严格限制碳水的摄入（10%以内），增加脂肪的摄入（50%以上），控制蛋白质比例（30%多），猛然一听是有些惊讶的，可是细细回想我们的祖先，在狩猎采集时代，人类的食谱主要就是肉类，偶尔吃点采集到的“瓜果蔬菜”吧，所以，我们的胃肠道和身体应该更适应这样子的饮食吧。</p> <p>如此一来，血糖比例会下降很多，不至于吃饱后复习那么困了，也不会导致很多的胖子（血糖充裕就容易转变为脂肪消耗不掉），以及糖尿病了吧？？</p></div></div>  <div class="page-edit"><!----> <!----> <!----></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/a99f0e/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">人生意义</div></a> <a href="/pages/c28002/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">诗酒趁年华</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
