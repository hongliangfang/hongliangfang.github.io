introduction" class="header-anchor">#</a> Introduction：</h2> <p>Aging is driven by hallmarks fulfilling the following three premises：</p> <ol><li>age-associated manifestation</li> <li>experiment could accentuate the acceleration of aging</li> <li>opportunity to decelerate,stop,orreverse aging by therapeutic interventions
驱动衰老标志，要有，三个前提：</li></ol> <ul><li>要有和年龄相关的，表现</li> <li>实验可以强化他们来，促进衰老</li> <li>要有通过对他们的治疗干预来，减缓/停止/逆转衰老的，机会</li></ul> <p>由此得出，衰老的，12个标志</p> <p><img src="https://cdn.statically.io/gh/hongliangfang/picx-images-hosting@master/study/Hallmark-of-aging.6aeyr9r8vcs0.webp" alt="Hallmark-of-aging"></p> <p>primary：基因组--端粒--表观遗传--蛋白质--自噬（中心法则）
antagonistic：营养感知--线粒体--细胞衰老（对抗的）
integrative：干细胞--细胞通讯--慢性炎症--稳态（综合的）</p> <p>三峡修大坝：
眼前：基因组不稳定--导致端粒掉了帽子--蛋白质分子伴侣来帮忙都阻挡不了--大坝自噬倾覆
自己：旁边有吃的都不知道吃了--吃不饱线粒体都干不动--细胞只能老老实实坐那里
朝堂之上：干细胞看着觉得不能继续下去了--拿起电话--怒斥下面的手下--老子打下的国泰面案讷！</p> <p>还有健康的，8个标志：
spatial compartmentalization：空间上的划分</p> <ol><li>integrity of barriers，完整的屏障</li> <li>containment of perturbations，对扰动的控制
maintenance of homeostasis：</li> <li>recycling and turnover，回收和周转 #不懂</li> <li>integration of circuitries，电路的集成 #不懂</li> <li>rhythmic oscillation，节奏震荡 #不懂
responses to stress：应对压力</li> <li>homeostatic resilience，稳定的适应力/弹性</li> <li>hormetic regulation，对激素的调节</li> <li>repair and regeneration，修复和再生</li></ol></div></div>  <div class="page-edit"><!----> <!----> <!----></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/076137/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">肿瘤的特征</div></a> <a href="/pages/e5759e/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">张老师的NK</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
