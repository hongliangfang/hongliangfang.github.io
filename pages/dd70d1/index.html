seurat从3+有了
SCTransform() = NormalizeData()+ScaleData()+FindVariableFeatures()
对测序深度的矫正效果好于log标准化（10w以内的细胞建议使用SCT标准化）
也可以用于矫正线粒体等因素影响，但不可以用于批次矫正</p> <p>NormalizeData()+ScaleData()+FindVariableFeatures()后的数据：
seurat_obj--assays--
RNA
counts：原始矩阵
data：normalize（log）后的矩阵
scale.data：scale后的矩阵
var.features：找出的2000个variable features</p> <p>SCTransform()后的数据：
seurat_obj--assays--
RNA--仍然保留
SCT：
counts：原始矩阵
data标准后：scale.data缩放后,var.features高变特征</p> <p>存放于不同的slot（RNA，SCT这一级）
输入PCs越多，能找到更多的生物学差异var.features（特征基因），也会引入更多的技术误差，SCT找了更多的var.features</p> <h2 id="monocle2"><a href="#monocle2" class="header-anchor">#</a> Monocle2</h2> <p>参考：
<a href="http://cole-trapnell-lab.github.io/monocle-release/docs/" target="_blank" rel="noopener noreferrer">Monocle2官网<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <p>scRNA data 可以做啥？
profile transcriptional regulation in complex biological processes and highly hetergeneous cell populations.
——描绘在不同的生物学过程中，在不同的细胞中的转录情况</p> <p>monocle2能干啥？<br>
1、clustering、classifying、counting cells（分群，定义）<br>
2、constructing single-cell trajectories（构建轨迹）<br>
3、differential expresssion analysis</p> <p>monocle2<br>
分析流程<br>
1、CellDataSet class
expression matrix：genes as row，cells as column
phenoData：cells as row，cell attributes as column——表型数据，细胞信息
featureData：feature as row，gene sttributes as column
——特征数据，基因信息</p> <p>2、appropriate distribution
FPKM/TPM ：generally log-normally distributed
UMIs or read counts： better modeled with the negative binomial</p> <p>3、estimate size factors and dispersions
后续分析和计算必须</p> <p>4、classifying and counting cells
by type、without marker genes、using marker genes、imputing cell type</p></div></div>  <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E6%80%BB" title="标签">#总</a></div> <!----></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/819cd3/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">单细胞-概览</div></a> <a href="/pages/784c69/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">单细胞-Scanpy系列</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
