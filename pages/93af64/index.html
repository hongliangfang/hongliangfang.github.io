先规划好放松生活的时间，再规划认真做事的实践；
记录时间，干了什么事情，花了多少时间，简单记录一下；
定期复盘，每周/每月定期复习分析；</p> <p>时间管理的那种，长期的节奏感，零碎的润滑零碎时间；
单线程处理事情；
多花时间处理重要但不紧急的任务；</p> <h2 id="零碎信息"><a href="#零碎信息" class="header-anchor">#</a> 零碎信息</h2> <p>摩尔定律，梅特卡夫定律：指数爆照现象</p> <p>黄金圈法则：是什么--怎么办--为什么</p> <p>信息的概念，香农说：信息是用来消除随机性的不确定性的东西</p> <p>关于知识的一个认识角度：
数据：对客观事实的直接反映
信息：有选择地整理的数据
知识：用于指导生产生活的指导思想
认知：理论加实践后的判断
智慧：广泛的实践得出的总结</p> <p>系统，按照某些秩序组织在一起的一个东西：
得有选择的输入，input；统一的入口
得有规则的处理，process；清晰的结构
得有条理的输出，output；可迭代的升级</p> <p>MECE原则，Mutually Exclusive, Collectively Exhaustive
不重复，不遗漏/相互独立，完全穷尽</p> <p>某一个领域内有知识体系，每个人能掌握的只是一个方面，就像一棵树从树干到树枝到树叶，每个人的知识体系可能只是在某一个小小的部分</p> <p>很有意思，对此也很感兴趣，包括人类的智慧，人类的动力，人类的美好品质，
人类为什么能够创造如此伟大的文明，世界，脑海里究竟有哪些智慧的力量？
人类为什么有那么强大的精神力量？伟大的理想信念，能够支持着人们坚持不懈？甚至创造生命的奇迹！
人类之间彼此友爱，相互帮助，创造出如此美妙的社会，真好！</p> <p>嗯，总结起来面对的对象包括，面对自然，面对自己，面对同伴；
改造或破坏客观世界的力量和智慧；面对自我的理解或迷惘；面对同伴的交流互助或伤害。</p> <p>大脑的智慧--认识自我的智慧，认识世界的智慧，认识他人的智慧</p> <p>几个关于经济学的心理学知识
<a href="https://wiki.apachecn.org/#/docs/business-5min-notes/README" target="_blank" rel="noopener noreferrer">商学院精细笔记<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>
心理账户，不同的地方，我们心理的账户，针对不同的方面，预计支配的钱是不一样的
沉没成本，有意制造的沉没成本，也就是提前花费的时间，金钱，精力等等
比例偏见，原本比较的数值，变成了更敏感的比例，，依附和比较吗？
损失规避，比起获得，失去的痛苦绝对值更大
价格锚点，消费者倾向于在权衡对比中，避免极端</p> <p>流量成本，遇到的潜在客户/为此付出的价格
定倍率，商品零售价格/商品成本，一般鞋服5~10，化妆品20~50...
利润，销量×利润</p> <p>经济学，事关自己的生活，然后，通过一些问题让我对此很感兴趣
房价为什么会升起来，或者降下去；现在的房价和曾经的盐，有什么关系？
中国经济转型，如何转到高精尖的技术领域中去？中国在这场战争中如何取得胜利？
还有些相关的问题吧，我如何在接下来的生活中，提高自己的竞争力，过上比较无忧无虑的生活呢？</p> <p>和大脑合作的角度
允许自己的感情产生，允许他人的行为，允许客观事物的变化，只有允许发生，才能看到客观事实，然后才能够进行其他实践</p> <p>保护好自己的胃，是对世间的美食一个交代</p> <h2 id="与生信大佬连麦对线"><a href="#与生信大佬连麦对线" class="header-anchor">#</a> 与生信大佬连麦对线</h2> <p>2023-12-24</p> <p>1、生信的代码，or 思路？</p> <p>确定自己需要面对的问题，知道问题所需要的手段；<br>
compute，用计算的视角，来研究相应的问题！</p> <p>2、临床和科研，如何结合产出结果？难点在哪里？</p> <p>目前可能，社会的投入，更加希望，有一个更明显的产出，即更希望成果能够应用到临床上面来；</p> <p>临床困难--科学问题--如何通过方法解决其中，比较直接的对接上面去；双方都要去思考，临床考虑需要解决什么问题，科研考虑使用什么工具，然后<code>双方互相了解</code>对方的问题，才能够更好的用科研工具解决临床问题。</p> <blockquote><p>反复凝练临床工作中的，科学问题！</p></blockquote> <p>3、生信分析和实验结果，谁更可靠？</p> <p>实验是，看得见，摸得着的东西；质控！前提假设！<br>
对生信数据和结果，保持一定的怀疑态度，同时多方面印证；</p> <p>生信的通量，是更大的，曾老师从这个角度是来开，是更支持这个的；</p> <p>谁更容易出错？<br>
湿实验，错误的方面好像更多；<br>
生信分析，除了新手之外，验证的方法更多，老手的操作倒不会出很多错误；<br>
还有，生信分析的数据，一般会给出来，可验证性更高；造假的可能性更低。</p> <p><strong>4、生信学习的必修课，是什么？</strong></p> <p>以办公三件套（WPS）为例，哪些科研工具熟练使用，能够提高效率？</p> <p>网页工具，就很不错呦！但是有很多限制（速度，数量，宕机等限制）</p> <p>发现问题，解决问题的能力和习惯？？<br>
跟进检测技术；多读文献；统计学分析；需要掌握一门熟练的语言；</p> <p>5、空间转录组<br>
数据量还不太够，好像，，也是一个比较前沿的技术。。（后边感觉是公司的广告了）</p> <h2 id="能力树-还是能力草丛"><a href="#能力树-还是能力草丛" class="header-anchor">#</a> 能力树，还是能力草丛？</h2> <p>是的哦，一看到这词，想起了自己的技能杂七杂八的，没有个专业精尖的地方！！</p> <h2 id="【ted演讲】越主动-越幸运"><a href="#【ted演讲】越主动-越幸运" class="header-anchor">#</a> 【TED演讲】越主动，越幸运！</h2> <p>愿意主动冒一点点小风险，走出舒适圈，主动抓住幸运之风~</p> <p>心怀感恩之心，对已享受的事情，不熟视无睹；</p> <p>正式自己的想法，哪怕很疯狂，都有可能变得不一样~</p> <h2 id="温铁军老师"><a href="#温铁军老师" class="header-anchor">#</a> 温铁军老师</h2> <p><a href="https://space.bilibili.com/3461575868418125" target="_blank" rel="noopener noreferrer">温老说的个人空间<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <p>封建：分封而建</p> <p>中国两千多年，叫封建嘛？叫<code>封建</code>历史吗？欧洲的那边，小小的一个乡村，小小的country，被king所统领，我们这边一个完整的体系，自上而下的管理，叫封建吗？至少算是，帝国主义吧！</p> <p>关于经济生产活动</p> <p>其实，我有时候觉得，我国对农民亏欠了太多太多。。有时候，农产品的价格太低了，辛辛苦苦种一年地，都不够好好生活的，这种维持人们最基本的生产生活需要的粮食，怎么会价格那么低呢？</p> <p>后来慢慢了解到，这种定价，能够推着农民子弟兵往城市走，去建设城市，推动城市的发展；可是他们这群健康的人去辛勤劳作几十年后，到了6-70岁之后，烙下一身的伤痕，还没有良好的医疗保障，反而这些在办公室里坐着看看电脑，拉扯拉扯，吹嘘吹嘘未来怎样怎样的人们，五险一金，为什么凭什么？他们实际创造了很多的价值了嘛？</p> <p>这种价值如何判断，我觉得是应该分级来看的，最基本的，也是最重要的，生存下去的各种土地资产，粮食资产，是维持着我们生存的，应该保持一个比较良好的价格才对得起辛苦劳作的人们吧！最开始进入农业社会是这样子的，可是渐渐的，额能够生产高级些的娱乐生产资本的人们，通过与农民进行交换，也能够获得生存下去的物资，这么看大家其实都还好，其乐融融，当然为了更好的统领这样子的生产活动，，也需要一些个领袖式的人物。但是越到后来，有一部分处于高位的人，想要更长久的享有这种“不劳无祸”，于是制定了更多的规则来约束农业劳作者，他们需要上交一部分粮食，才能够获得所谓的保护也好，领导也罢，最开始都是有的，但是越来越形成习惯，这个价格越来越高......</p> <p>基础建设 → 房子 → 生产资产，实体资产</p> <p>金融资本，衍生的金融产品</p> <p>东亚资本危机 -- 资本流向美国，苏联解体，IT民用，前期的成本已经由美苏争霸期间投入</p> <p>60年代，美苏都不搭理了，还有核打击那边威胁着，我们一边维持着生存，那边一边搞原子弹！</p> <p>70年代，老苏要打，美国觉得机会来了，小球带大球，解除了对中国的封锁</p> <p>经济的评价标准，实物的产出，还是，GDP</p> <p>GDP，Gross Domestic Product，国内生产总值</p> <p>交易的速度，单位时间内，交换的次数，产生的增加值？？</p> <h2 id="第二大脑"><a href="#第二大脑" class="header-anchor">#</a> 第二大脑</h2> <p>《打造第二大脑》：顶级知识管理大师，手把手带你正确搭建个人知识管理系统</p> <p>GTD方法，子弹笔记，斯科特杨 ——→ 推崇/支持 知识管理方法</p> <p>第二大脑：一种外部工具/系统，用来帮助我们存储，管理 和 回忆 信息，以此减轻我们大脑的记忆负担；也叫，个人知识管理系统</p> <p>如果着手准备的话，就像建设一个生产厂一样，需要，考虑这样几件事情：</p> <ol><li>笔记的内容板块，即收集部分，整理部分，产出部分，归档部分 -- 工厂的原材料，生产机器，成品仓库</li> <li>笔记的生产过程，也就是一条完整的顺利的工作流 -- 工厂的生产线，按照这条线，要把原料最后变成产品</li> <li>笔记的应用过程，也就是对自己的生产生活的帮助作用 -- 工厂产品的销售环节</li> <li>笔记的反思过程，也就是，一段时间后，要分析自己的流程的优劣，不断反馈调整 -- 工厂的机器，人工，生产线的改革环节</li></ol> <h2 id="慕课-社会心理学-人际吸引"><a href="#慕课-社会心理学-人际吸引" class="header-anchor">#</a> 慕课--社会心理学--人际吸引</h2> <p>为什么，有的人那么有<code>吸引力</code>呢？能够引起别人的<code>注意力</code>呢？</p> <p>1、外貌</p> <p>与人相处，外貌是最直观的表现，当然，漂亮的外貌，也是最直接的吸引力；同时，对于有较好外貌的人，会产生“光环效应”！</p> <blockquote><p>光环效应，我们倾向于将美好的品质，附加于美好外貌的人身上</p></blockquote> <p>2、相似性</p> <p>意识到彼此的相似性，则容易互相吸引，并产生亲密感/intimacy；不管这些相似在观点，态度，背景，穿着等等各种地方；</p> <p>3、互补性</p> <p>4、出丑</p> <p>5、赞美</p> <p>6、人格魅力</p> <p>7、人际排斥</p> <p>8、爱与吸引力/爱情吸引力</p> <p>爱情三角理论：亲密，激情，承诺（温暖的，热烈的，冷静的）</p> <p>几种误区：</p> <ul><li>把爱变成了被爱，做着等你来爱的事情，而不是去做爱你的事情</li> <li>把爱设想为一个对象的问题，而不是爱的能力的问题</li> <li>把坠入情网，和爱的相处，混淆不清</li></ul> <p>9、一见钟情效应</p> <p>生理，心理的兴奋，愉悦！</p> <p>生理上，下丘脑，释放，多巴胺
心理上，符合自己的，爱情地图</p> <p>10、熟悉效应 或 曝光效应</p> <p>11、情绪唤醒效应 或 吊桥效应</p></div></div>  <div class="page-edit"><!----> <!----> <!----></div> <div class="page-nav-wapper"><!----> <!----></div></div> <div class="article-list"><div class="article-title"><a href="/archives/" class="iconfont icon-bi">最近更新</a></div> <div class="article-wrapper"><dl><dd>01</dd> <dt><a href="/pages/c81394/"><div>
