以某一个<strong>目的</strong>，建立一个笔记！
以某一个<strong>主题</strong>，建立一个文件夹，应对较庞大的内容！
一个良好的笔记系统，是要<strong>辅助</strong>自己思考的，同时也是自己思考过程的<strong>体现</strong>。
内容本身，要根据目的，突出重点；侧边的导航栏，方便浏览整体的内容和流程；
打上标签，在一个较小范围内标注，但是是为了回到全局的时候方便查找；
全局搜索，是方便模糊的搜索，在记不清的时候很方便！</p> <h2 id="生物学背景知识"><a href="#生物学背景知识" class="header-anchor">#</a> 生物学背景知识</h2> <p>学了好久，大都只是在脑袋里面留有一些整体的印象，没有很详细的逻辑，稍稍整理一下。</p> <p>基因的结构</p> <blockquote><p>空间结构上，从，ATCG序列 → 双螺旋结构 → 核小体 → TADs → 袢环 → Compartments → 染色单体 → 常染色质/异染色质
线性的结构上，基因由“转录区”（编码区，非编码区，内含子，外显子），转录调控区（启动子，增强子）
核苷酸的碱基层面上、结构还有甲基化、乙酰化（导致对基因的表达产生影响）
核小体的组蛋白，还能够接受不同的修饰（磷酸化，等）影响基因的表达</p></blockquote> <p>基因的功能</p> <blockquote><p>复制，转录，翻译</p></blockquote> <p>基因的突变</p> <blockquote><p>突变的多少（染色体层面，区段层面，碱基层面），对蛋白质的影响</p></blockquote> <p>生信分析研究的什么</p> <blockquote><p>从中心法则的角度来看，有：基因组，表观组，转录组，蛋白组
分别可以研究基因上碱基的数量种类变化，基因的结构变化，转录出来的RNA变化，最后合成产生的蛋白质变化</p></blockquote> <p>基因的测序方法和原理</p> <blockquote><p>一代，二代，三代
目前还有单细胞测序，细胞表面的TCR/BCR，结合空间信息，还有细胞外囊泡还能反卷积出来</p></blockquote> <p>基因数据中心</p> <blockquote><p>NCBI，ENSEMBL，UCSC</p></blockquote> <h2 id="计算机背景知识"><a href="#计算机背景知识" class="header-anchor">#</a> 计算机背景知识</h2> <h3 id="linux服务器操作"><a href="#linux服务器操作" class="header-anchor">#</a> linux服务器操作</h3> <h4 id="基本信息"><a href="#基本信息" class="header-anchor">#</a> 基本信息</h4> <div class="language- line-numbers-mode"><pre class="language-text"><code># 登录进来

<span class="token comment"># 不知道怎么用，帮帮我！</span>
help<span class="token punctuation">(</span>package <span class="token operator">=</span> <span class="token string">'name'</span><span class="token punctuation">)</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br></div></div><h4 id="数据格式"><a href="#数据格式" class="header-anchor">#</a> 数据格式</h4> <p>这一部分蛮重要的，是日后理解和操作的基础！</p> <h4 id="数据读取和操作"><a href="#数据读取和操作" class="header-anchor">#</a> 数据读取和操作</h4> <p><img src="https://cdn.statically.io/gh/hongliangfang/picx-images-hosting@master/study/R%E8%AF%BB%E5%8F%96%E6%95%B0%E6%8D%AE%E6%96%B9%E6%B3%95.54kkbu0pjf80.webp" alt="R读取数据方法"></p> <p>约定俗成，无强制性（win下会报错）
csv，Comma Separated Values，逗号分割值
tsv，Tab Separated Values，制表符分隔值</p> <p>三个目录
<code>getwd()</code>，当前工作目录，<code>自己设定的</code> <code>R.home()</code>，安装的目录，R_HOME，<code>&quot;D:/R/R-4.3.1&quot;</code> <code>path.expand(&quot;~&quot;)</code>，默认工作目录，HOME</p> <h4 id="保存和退出"><a href="#保存和退出" class="header-anchor">#</a> 保存和退出</h4> <div class="language- line-numbers-mode"><pre class="language-text"><code>save.image() # 保存当前工作环境下的所有信息；
save.image(file = &quot;file_name&quot;) # 只保存当前工作环境下的一个变量； load(fila = &quot;file_name&quot;) # 用于加载保存的工作环境或变量
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><h4 id="tips"><a href="#tips" class="header-anchor">#</a> tips</h4> <blockquote><p>R是一个很<code>口语化</code>的语言，偏自然语言的计算机语言！所以很多时候，不知道咋调用函数了，就可以“用英语”操作起来</p></blockquote> <div class="language-R line-numbers-mode"><pre class="language-r"><code><span class="token comment"># 超级好用的语法</span>
help<span class="token punctuation">(</span><span class="token punctuation">)</span>
example<span class="token punctuation">(</span><span class="token punctuation">)</span>
summary<span class="token punctuation">(</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><p><code>ggplot2</code>，贼厉害的一个绘图包，日后主要要靠它呢！</p> <h3 id="python语言"><a href="#python语言" class="header-anchor">#</a> Python语言</h3> <p>详见后续单细胞分析</p> <h3 id="数据格式-2"><a href="#数据格式-2" class="header-anchor">#</a> 数据格式</h3> <h4 id="geo-gene-expression-omnibus-data-base-基因表达数据库"><a href="#geo-gene-expression-omnibus-data-base-基因表达数据库" class="header-anchor">#</a> GEO，Gene Expression Omnibus data base，基因表达数据库</h4> <p>组成：</p> <ul><li>GEO Platform (GPL)：芯片平台</li> <li>GEO Sample (GSM)：样本ID</li> <li>GEO Series (GSE)：study的ID</li> <li>GEO Dataset (GDS)：数据集的ID号
理解起来也很容易。一篇文章可以有一个或者多个GSE数据集，一个GSE里面可以有一个或者多个GSM样本。多个研究的GSM样本可以根据研究目的整合为一个GDS，不过GDS本身用的很少。而每个数据集都有着自己对应的芯片平台，就是GPL。</li></ul> <h4 id="sra-sequence-read-archive-高通量测序数据库"><a href="#sra-sequence-read-archive-高通量测序数据库" class="header-anchor">#</a> SRA，Sequence Read Archive，高通量测序数据库</h4> <p>组成：</p> <ul><li>studies，研究课题，多个实验设计</li> <li>experiments，实验设计，测序平台，哪些数据等</li> <li>samples，样本信息，表型，品系，临床分期，组织类型等</li> <li>runs，测序数据集</li></ul> <h4 id="gtf-gff-gene-transfer-format-gene-feature-format-注释基因-基因组"><a href="#gtf-gff-gene-transfer-format-gene-feature-format-注释基因-基因组" class="header-anchor">#</a> GTF/GFF，Gene Transfer Format / Gene Feature Format，注释基因/基因组</h4> <p><img src="https://cdn.statically.io/gh/hongliangfang/picx-images-hosting@master/study/%E4%BA%BA%E7%B1%BB%E6%B3%A8%E9%87%8A%E5%9F%BA%E5%9B%A0%E7%BB%84%E5%91%BD%E5%90%8D.7jt67n6aej40.webp" alt="人类注释基因组命名"> <img src="https://cdn.statically.io/gh/hongliangfang/picx-images-hosting@master/study/%E5%B0%8F%E9%BC%A0%E6%B3%A8%E9%87%8A%E5%9F%BA%E5%9B%A0%E7%BB%84%E5%91%BD%E5%90%8D.5ycu5ndivtw0.webp" alt="小鼠注释基因组命名"></p> <p>下载位置：
<a href="https://www.ncbi.nlm.nih.gov/genome/browse#!/overview/" target="_blank" rel="noopener noreferrer">NCBI<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> <a href="http://asia.ensembl.org/" target="_blank" rel="noopener noreferrer">Ensemble<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> <a href="https://www.gencodegenes.org/" target="_blank" rel="noopener noreferrer">GeneCode<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>，一般最全
<a href="http://genome.ucsc.edu/cgi-bin/hgTables" target="_blank" rel="noopener noreferrer">UCSC<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <h4 id="bed-browser-extensible-data-浏览器拓展数据"><a href="#bed-browser-extensible-data-浏览器拓展数据" class="header-anchor">#</a> BED，Browser Extensible Data，浏览器拓展数据</h4> <h4 id="sam-sequence-alignment-mapping-序列比对映射"><a href="#sam-sequence-alignment-mapping-序列比对映射" class="header-anchor">#</a> SAM，Sequence Alignment Mapping，序列比对映射</h4> <p>BAM，二进制的SAM，体积更小</p> <h4 id="基因名字"><a href="#基因名字" class="header-anchor">#</a> 基因名字</h4> <p>基因的名字
<img src="https://cdn.statically.io/gh/hongliangfang/picx-images-hosting@master/study/Ensemble_Entrze_symbol%E5%9F%BA%E5%9B%A0%E5%90%8D.16vfu9mcj080.webp" alt="Ensemble_Entrze_symbol基因名"></p> <p>ensembl：在Ensembl数据库中对应的基因名称，物种+种类+数字；
entrze：纯纯的数字；
symbol：人类基因委员会命名，多是根据名字进行命名；</p> <p><a href="https://www.jianshu.com/p/3b27c32fa392" target="_blank" rel="noopener noreferrer">gene ID / Gene Symbol / Ensembl ID - 简书 (jianshu.com)<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <p>如何进行<a href="https://cloud.tencent.com/developer/article/1638495" target="_blank" rel="noopener noreferrer">基因ID转换<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <p><a href="https://www.jianshu.com/p/9dfb65e405e8" target="_blank" rel="noopener noreferrer">FPKM→TPM<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p></div></div>  <
