女孩子，但是最后高考结束了都没有机会再见面好好说一句话，更别说邀请她一起看个电影呀，吃个饭呀...呜呜呜，差距太大了...</p></blockquote> <p>诊断：直接证据，间接证据；最明显的可能性，以及少见的可能性；永远都不能迷信权威！</p> <p>有一次在普林斯顿，我收到一个包裹，里面是一盒铅笔：墨绿色的笔杆上有一行金色的字，写着“亲爱的理查德，我爱你！小笨瓜。”是艾琳寄来的。（我叫她“小笨瓜”。）</p> <blockquote><p>ps：好羡慕呀，费曼对女友的称呼竟然是酱紫的，哈哈，看到这儿，也触动了我内心对她的一些称呼~</p></blockquote> <p>对我和艾琳来说，区别只是我们拥有的不是五十年，而是五年。这只是量的区别，面对的心理重负是相同的。除非我们觉得“那些拥有五十年的人更幸福”，那么才确实有所区别。可是那种想法太奇怪了。为什么要抱怨“我怎么这么倒霉？上帝怎么这样对我？我到底做错了什么才受到这样的惩罚”，来让自己变得更痛苦呢？如果你明白了现实，并发自内心地接受它，便绝对不会有上述种种抱怨。谁也不知道会发生什么，你所经历的只是生命中的一个偶然。</p> <ul><li>在明知道生命短暂的情况下，我们心理要时常承受着担心而离去吗？不会，我们人类知道如何面对这个难题：我们欢笑，欢乐，生活。</li></ul></div></div>  <div class="page-edit"><!----> <!----> <!----></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/ef8bef/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">认知觉醒</div></a> <a href="/pages/57d572/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">稀缺</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
