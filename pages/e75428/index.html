Ht60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">想法和借鉴<!----></h1>  <div class="theme-vdoing-content content__default"><p>#想法</p> <h3 id="nk细胞有感"><a href="#nk细胞有感" class="header-anchor">#</a> NK细胞有感</h3> <p>既然在泛癌的角度下，不同的T细胞和NK细胞有区别，那么，我们换一个精细的维度，在不同的胃癌/结直肠癌/食管癌等等之中，细胞亚群/不同种类的细胞群体，是否有什么异质性？或者换句话说，在不同种类的胃癌中，某种细胞群体/某一类细胞的异质性怎么样？可以作为治疗靶点吗？结合免疫治疗，肿瘤微环境；以及发生演变的过程，进化分析状态，咱们是不是也可以来比较分析一下？
还有和肠道菌群之间的关系？最近，我看到几篇文章研究，肿瘤内微生物（包括真菌，细菌）对于肿瘤的迁移能力都是有些影响的？可以联系在一起吗？肠道微生物组学和胃肠道的肿瘤单细胞组学，能擦除什么样子的火花？
还有，我记得，王老师说过东亚人的胃癌发病率高于欧美国家的发病率，那么，不同地区的异质性呢？？有意思吗？有什么意义吗？为指导用药？？一般都是FDA批准了之后，我们试着去应用，或者直接拿来按照类似的剂量使用了，但是，我们呢不一样，我们之间的胃癌不一样，so，可不可以试一试？
