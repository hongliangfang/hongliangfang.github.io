注释可以分为手动和自动，都有自动的注释方法，为什么还要手动的注释呢？因为，手动的注释不难，但是准确，个性，可以自定义；自动注释难免有差池，而且也不是最新最前沿的进展。</p> <h2 id="细胞注释"><a href="#细胞注释" class="header-anchor">#</a> 细胞注释</h2> <div class="language- line-numbers-mode"><pre class="language-text"><code>

PD-L1 = CD274</p> <h2 id="细胞分类"><a href="#细胞分类" class="header-anchor">#</a> 细胞分类</h2> <p><a href="https://mp.weixin.qq.com/s/Ji5om3W_K45zjB83cdStqQ" target="_blank" rel="noopener noreferrer">Cell正刊单细胞命名和注释工作<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>
细胞谱系分化是指细胞在多次细胞分裂和分化过程中逐渐发展成不同类型的细胞。以下是一些常见的细胞谱系分化轨迹及其分化成的细胞类型：</p> <p>细胞种类/组织分类/从外到内，<strong>上皮-肌肉-脂肪、神经血液</strong></p> <ol><li><p>造血细胞谱系（Hematopoietic cell lineage）：</p> <ul><li>多能造血干细胞（Hematopoietic stem cells）</li> <li>淋巴细胞（Lymphocytes）：包括T细胞、B细胞和自然杀伤细胞（NK细胞）。</li> <li>骨髓细胞（Myeloid cells）：包括粒细胞、单核细胞、红细胞、血小板。</li></ul></li> <li><p>神经系统细胞谱系（Neuronal cell lineage）：</p> <ul><li>神经干细胞（Neural stem cells）</li> <li>神经发生元细胞（Neuroblasts）：分化为成熟的神经元。</li> <li>神经胶质细胞（Neuroglial cells）：包括星形胶质细胞（Astrocytes）、少突胶质细胞（Oligodendrocytes）、小胶质细胞（Microglia）。</li></ul></li> <li><p>上皮细胞谱系（Epithelial cell lineage）：</p> <ul><li>上皮干细胞（Epithelial stem cells）</li> <li>多种类型的上皮细胞，根据分化方向和组织类型不同可包括表皮细胞、单层和多层柱状上皮细胞、腺上皮细胞等。</li></ul></li> <li><p>肌肉细胞谱系（Muscle cell lineage）：</p> <ul><li>肌干细胞（Myoblasts）</li> <li>横纹肌细胞（Striated muscle cells）：分化为骨骼肌、心肌细胞。</li></ul></li> <li><p>脂肪细胞谱系（Adipocyte cell lineage）：</p> <ul><li>脂肪干细胞（Adipose stem cells）</li> <li>脂肪细胞（Adipocytes）：分化为白色脂肪细胞、棕色脂肪细胞。</li></ul></li></ol> <p>这只是举例说明了一些常见的细胞谱系分化轨迹和其分化成的细胞类型，实际上，细胞的分化可能更为复杂和多样化。不同的组织和器官中可能存在着更多细胞谱系分化轨迹，并形成特定细胞类型的复杂网络。</p> <p>造血细胞谱系是指骨髓中产生的各类血细胞的演化和分化过程。它包括多能造血干细胞（Hematopoietic stem cells）分裂和分化为不同类型的先体细胞（precursor cells），然后进一步分化为成熟的血细胞。</p> <ol><li><p>T淋巴细胞系列：</p> <ul><li>多能造血干细胞（Hematopoietic stem cells）</li> <li>T淋巴细胞前体细胞（T-lymphocyte progenitor cells）</li> <li>成熟的T淋巴细胞（Mature T-lymphocytes）</li></ul></li> <li><p>B淋巴细胞系列：</p> <ul><li>多能造血干细胞（Hematopoietic stem cells）</li> <li>B淋巴细胞前体细胞（B-lymphocyte progenitor cells）</li> <li>成熟的B淋巴细胞（Mature B-lymphocytes）</li></ul></li> <li><p>自然杀伤细胞（NK细胞）系列：</p> <ul><li>多能造血干细胞（Hematopoietic stem cells）</li> <li>自然杀伤细胞前体细胞（Natural Killer cell progenitor cells）</li> <li>成熟的自然杀伤细胞（Mature Natural Killer cells）</li></ul></li> <li><p>粒细胞（Granulocytes）系列：</p> <ul><li>多能造血干细胞（Hematopoietic stem cells）</li> <li>粒细胞前体细胞（Granulocyte progenitor cells）</li> <li>中性粒细胞（Neutrophils）</li> <li>嗜酸性粒细胞（Eosinophils）</li> <li>嗜碱性粒细胞（Basophils）</li></ul></li> <li><p>单核细胞（Monocytes）系列：</p> <ul><li>多能造血干细胞（Hematopoietic stem cells）</li> <li>单核细胞前体细胞（Monocyte progenitor cells）</li> <li>成熟的单核细胞（Mature Monocytes）</li> <li>可分化为巨噬细胞（Macrophages）或树突状细胞（Dendritic cells）</li></ul></li> <li><p>红细胞（Erythrocytes）系列：</p> <ul><li>多能造血干细胞（Hematopoietic stem cells）</li> <li>红细胞前体细胞（Erythroblast progenitor cells）</li> <li>成熟的红细胞（Mature Erythrocytes）</li></ul></li> <li><p>血小板（Platelets）系列：</p></li></ol> <ul><li>多能造血干细胞（Hematopoietic stem cells）</li> <li>血小板前体细胞（Megakaryocyte progenitor cells）</li> <li>成熟的血小板（Mature Platelets）</li></ul> <p>这是狭义上的造血细胞谱系的分类，不包括骨髓细胞系列（如骨髓基质细胞）等其他细胞类型。细胞谱系的分化过程是一个复杂且精密调控的过程，其中各个细胞类型都起到特定的功能和调节作用，以维持体内的血液平衡和免疫功能。</p> <p>其他一些marker</p> <p>肿瘤浸润的细胞标记
