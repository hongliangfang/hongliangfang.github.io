题作者们的无私贡献和分享。</p> <h3 id="🏡域名"><a href="#🏡域名" class="header-anchor">#</a> 🏡域名</h3> <p>围炉夜话，<code>weiluyehua</code>，加上<code>site</code>，嗯，感觉很像是在一个温暖的小屋里，<code>家人闲坐，灯火可亲</code>的氛围。</p> <p>于此，这个名字，在未来十年里暂时属于我，希望能够坚持写写东西，通过不断的认识和实践，翻越自己这座高山，走向远方，同时也算是为自己这个渺小的，短暂的，伟大的生命，留下的一点生命走过的痕迹。</p> <h2 id="联系"><a href="#联系" class="header-anchor">#</a> ✉️ 联系</h2> <ul><li><strong>Email</strong>: <a href="mailto:2590643635@qq.com">2590643635@qq.com</a></li> <li><strong>GitHub</strong>: <a href="https://github.com/hongliangfang" target="_blank" rel="noopener noreferrer">https://github.com/hongliangfang<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></li> <li><strong>WeChat</strong>: &lt;哈哈，要微信嘛？&gt;</li></ul></div></div> <div class="main-right"><aside class="blogger-wrapper card-box" data-v-7d2bb426><div class="avatar"><img src="https://pica.zhimg.com/v2-f2b30ad5674f652294f0ec6f9b8c9922_720w.webp?source=d16d100b" alt="头像" title="我好看吗"></div> <div class="icons"><a href="mailto:2590643635@qq.com" title="发邮件" target="_blank" class="iconfont icon-youjian" style="width:33.333333333333336%;"></a><a href="https://github.com/hongliangfang" title="GitHub" target="_blank" class="iconfont icon-github" style="width:33.333333333333336%;"></a><a href="https://music.163.com/#/playlist?id=755597173" title="听音乐" target="_blank" class="iconfont icon-erji" style="width:33.333333333333336%;"></a></div> <div class="blogger"><span class="name">围炉夜话</span> <span class="slogan">知行合一</span></div></aside> <div class="categories-wrapper card-box
